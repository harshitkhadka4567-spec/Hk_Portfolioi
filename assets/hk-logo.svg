<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" role="img" aria-labelledby="title desc">
  <title id="title">Harshit Khadka logo</title>
  <desc id="desc">Luxury minimalist HK monogram with Harshit Khadka and Computer Science Sophomore text.</desc>
  <defs>
    <linearGradient id="logo-bg" x1="60" y1="24" x2="460" y2="296" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#181818"/>
      <stop offset="0.52" stop-color="#050505"/>
      <stop offset="1" stop-color="#242424"/>
    </linearGradient>
    <linearGradient id="silver" x1="156" y1="74" x2="364" y2="202" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.36" stop-color="#c9cbd0"/>
      <stop offset="0.68" stop-color="#f7f7f8"/>
      <stop offset="1" stop-color="#8d9199"/>
    </linearGradient>
    <linearGradient id="hairline" x1="96" y1="40" x2="424" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f6f7f8" stop-opacity="0.82"/>
      <stop offset="0.5" stop-color="#7b7f87" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.68"/>
    </linearGradient>
  </defs>

  <rect width="520" height="320" rx="30" fill="#050505"/>
  <rect x="18" y="18" width="484" height="284" rx="24" fill="url(#logo-bg)" stroke="#2a2a2a"/>
  <rect x="42" y="42" width="436" height="236" rx="18" fill="none" stroke="url(#hairline)" stroke-width="1"/>

  <g fill="url(#silver)" font-family="'Playfair Display', Didot, 'Bodoni 72', Georgia, serif" text-anchor="middle">
    <text x="260" y="169" font-size="106" font-weight="700" letter-spacing="0">HK</text>
    <text x="260" y="224" font-size="28" font-weight="700" letter-spacing="0.5">Harshit Khadka</text>
  </g>

  <text x="260" y="253" fill="#b7bac1" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" letter-spacing="3.4" text-anchor="middle">COMPUTER SCIENCE SOPHOMORE</text>
  <path d="M166 190h188" stroke="#f4f4f5" stroke-opacity="0.24"/>
</svg>
